<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CafeCalc Rural</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#4e342e;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.container{
width:90%;
max-width:900px;
}

.titulo{
font-size:48px;
margin-bottom:30px;
}

.texto{
font-size:32px;
margin-bottom:30px;
}

input{
width:70%;
padding:18px;
font-size:28px;
border-radius:10px;
border:none;
text-align:center;
}

.botao{
margin-top:30px;
padding:18px 40px;
font-size:26px;
border:none;
border-radius:10px;
background:#ffca28;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="titulo">☕ CafeCalc Rural</div>

<div id="texto" class="texto"></div>

<input id="entrada" type="number" placeholder="Digite o número aqui">

<br>

<button id="continuar" class="botao">Começar</button>

</div>

<script>

let precoCafe = 920
let passo = -1
let dados = {}

let perguntas = [
"Quantas sacas de café você colheu?",
"Quantos hectares de café você tem?",
"Quanto você gastou com mão de obra?",
"Quanto você gastou com adubo?",
"Quanto você gastou com agrotóxicos?",
"Quanto você gastou com máquinas ou trator?",
"Quanto você gastou com transporte?"
]

let campos = [
"sacas",
"hectares",
"mao",
"adubo",
"agro",
"trator",
"transporte"
]

function falar(texto){

if(!('speechSynthesis' in window)) return

speechSynthesis.cancel()

let msg = new SpeechSynthesisUtterance(texto)
msg.lang="pt-BR"
msg.rate=0.9

speechSynthesis.speak(msg)

}

function mostrarInicio(){

let texto = 
"O preço médio da saca de café hoje é "+precoCafe+
" reais. Este programa ajuda a calcular o lucro aproximado da sua safra."

document.getElementById("texto").innerText = texto
document.getElementById("entrada").style.display="none"

falar(texto)

}

function proximaPergunta(){

passo++

if(passo >= perguntas.length){
calcular()
return
}

document.getElementById("entrada").value=""
document.getElementById("entrada").style.display="inline"

let pergunta = perguntas[passo]

document.getElementById("texto").innerText = pergunta

falar(pergunta)

}

document.getElementById("continuar").onclick=function(){

if(passo == -1){

proximaPergunta()
return

}

let valor = document.getElementById("entrada").value

if(valor == ""){
alert("Digite um número")
return
}

dados[campos[passo]] = Number(valor)

proximaPergunta()

}

function calcular(){

let custo =
dados.mao +
dados.adubo +
dados.agro +
dados.trator +
dados.transporte

let receita = dados.sacas * precoCafe

let lucro = receita - custo

let minimo = custo / dados.sacas

let textoFinal = ""

if(lucro > 0){

textoFinal =
"Vamos analisar sua produção. " +
"Você produziu aproximadamente " + dados.sacas + " sacas de café. " +
"Com o preço atual da saca em " + precoCafe + " reais, sua receita aproximada foi de " +
receita.toFixed(2) + " reais. " +
"O seu custo total de produção foi de aproximadamente " +
custo.toFixed(2) + " reais. " +
"Isso significa que você teve um lucro aproximado de " +
lucro.toFixed(2) + " reais nesta safra. " +
"Para não ter prejuízo, o preço mínimo da sua saca precisaria ser de aproximadamente " +
minimo.toFixed(2) + " reais. " +
"Esses valores são estimativas e servem apenas para ajudar você a entender melhor a situação da sua produção."

}

else{

textoFinal =
"Vamos analisar sua produção. " +
"Você produziu aproximadamente " + dados.sacas + " sacas de café. " +
"Com o preço atual da saca em " + precoCafe + " reais, sua receita aproximada foi de " +
receita.toFixed(2) + " reais. " +
"O seu custo total de produção foi de aproximadamente " +
custo.toFixed(2) + " reais. " +
"Neste cenário, infelizmente sua produção teve um prejuízo aproximado de " +
Math.abs(lucro).toFixed(2) + " reais. " +
"Para não ter prejuízo, o preço mínimo da sua saca precisaria ser de aproximadamente " +
minimo.toFixed(2) + " reais. " +
"Esses valores são estimativas e servem apenas para ajudar você a entender melhor a situação da sua produção."

}

document.getElementById("entrada").style.display="none"
document.getElementById("continuar").style.display="none"

document.getElementById("texto").innerText = textoFinal

falar(textoFinal)

}

mostrarInicio()

</script>

</body>
</html>
